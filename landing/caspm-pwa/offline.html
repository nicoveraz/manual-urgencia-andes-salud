<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — urgpedia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b1120; color: #e8edf5;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%; text-align: center;
    }
    .icon {
      width: 56px; height: 56px; margin: 0 auto 24px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 28px; height: 28px; }
    h1 {
      font-size: 1.2rem; font-weight: 700; letter-spacing: -.02em;
      margin-bottom: 12px; color: #fff;
    }
    p { font-size: .9rem; color: #6b7fa3; line-height: 1.7; margin-bottom: 8px; }
    .btn {
      display: inline-block; margin-top: 28px;
      padding: 10px 22px; border-radius: 8px;
      background: #04488e; color: #fff; font-size: .875rem; font-weight: 600;
      text-decoration: none; border: none; cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: #1a6bc7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#6b7fa3">
        <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
      </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>No hay conexión a internet y esta página no está disponible en caché.</p>
    <p>Las páginas que hayas visitado anteriormente siguen accesibles desde el historial del navegador.</p>
    <button class="btn" onclick="window.history.back()">Volver</button>
  </div>
</body>
</html>
