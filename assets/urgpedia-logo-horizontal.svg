<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="ecgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- Icon background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>

  <!-- U shape scaled to icon -->
  <rect x="38" y="30" width="28" height="82" rx="14" fill="white"/>
  <rect x="134" y="30" width="28" height="82" rx="14" fill="white"/>
  <path d="M38,92 L38,108 Q38,164 100,164 Q162,164 162,108 L162,92 L134,92 L134,108 Q134,138 100,138 Q66,138 66,108 L66,92 Z" fill="white"/>

  <!-- ECG line on icon -->
  <polyline
    points="12,100  52,100  60,78  70,122  78,62  88,100  112,100  122,82  130,108  138,100  188,100"
    fill="none"
    stroke="url(#ecgGrad)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Wordmark: "urg" regular + "pedia" bold -->
  <!-- "urg" -->
  <text x="222" y="124" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="88" font-weight="300" fill="#1565c0" letter-spacing="-2">urg</text>
  <!-- "pedia" -->
  <text x="398" y="124" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="88" font-weight="700" fill="#0d47a1" letter-spacing="-2">pedia</text>
</svg>
