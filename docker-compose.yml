version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: wiki-db
    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: wikijs
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - wiki-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikijs -d wiki"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  wiki:
    image: ghcr.io/requarks/wiki:2
    container_name: wiki
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: wikijs
      DB_PASS: ${DB_PASSWORD}
      DB_NAME: wiki
    volumes:
      - wiki-data:/wiki/data
      # ── Customizaciones persistidas (no se pierden al recrear el contenedor) ──
      - ./overrides/login.pug:/wiki/server/views/login.pug:ro
      - ./overrides/servers.js:/wiki/server/core/servers.js:ro
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    networks:
      - wiki-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  db-data:
  wiki-data:

networks:
  wiki-network:
    driver: bridge
